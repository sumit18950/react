    <script>

                $(this).css('color','orange');
            })

            $('h1').mouseout(function(){

            })

            })

            $('#btn2').click(function(){

                    alert('working');
                var num1 = parseInt($('#txt1').val());

                var addition =  num1 + num2;
                var subtraction = num1 - num2;
                var multiplication = num1 * num2;
                var division = num1 / num2;

                $('#add').text('Addition is ' + addition);                
                $('#sub').text('subtraction is : ' + subtraction);                
                $('#mul').text('Multiplication is : ' + multiplication);                
                $('#div').text('Division is : ' + division);



            })

        })
    </script>
