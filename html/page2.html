<!DOCTYPE html>
<html>
<head>
    <title>Users Page</title>
</head>
<body onload="getUser()">
    <h2>User List</h2>
    <div id="user"></div>

    <script>
        function getUser(){
            var url = "https://jsonplaceholder.typicode.com/users";
            fetch(url)
                .then(res => res.json())
                .then(result => {
                    let output = "<table border='1'><tr><th>ID</th><th>Name</th><th>Email</th><th>City</th></tr>";
                    
                    result.forEach(user => {
                        output += `<tr>
                                    <td>${user.id}</td>
                                    <td>${user.name}</td>
                                    <td>${user.email}</td>
                                    <td>${user.address.city}</td>
                                   </tr>`;
                    });

                    output += "</table>";
                    document.getElementById("user").innerHTML = output;
                })
                .catch(error => {
                    alert('error');
                    console.error(error);
                });
        }
    </script>
</body>
</html>
